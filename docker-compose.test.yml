services:
  # ============================================================================
  # TEST DATABASE SERVICES (using anonymous volumes for fresh data each run)
  # ============================================================================

  # PostgreSQL for Customer Service
  customer-db:
    image: postgres:16-alpine
    container_name: fbpage-mm-test-customer-db
    restart: "no"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${CUSTOMER_SERVICE_DB:-customer_service}
    volumes:
      # Anonymous volume - fresh data every run, auto-cleaned on container removal
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - fbpage-mm-test-network

  # PostgreSQL for Message Service
  message-db:
    image: postgres:16-alpine
    container_name: fbpage-mm-test-message-db
    restart: "no"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${MESSAGE_SERVICE_DB:-message_service}
    volumes:
      # Anonymous volume - fresh data every run, auto-cleaned on container removal
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - fbpage-mm-test-network

  # PostgreSQL for Facebook Graph Service
  facebook-db:
    image: postgres:16-alpine
    container_name: fbpage-mm-test-facebook-db
    restart: "no"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${FACEBOOK_GRAPH_DB:-facebook_graph}
    volumes:
      # Anonymous volume - fresh data every run, auto-cleaned on container removal
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - fbpage-mm-test-network

  # ============================================================================
  # APPLICATION SERVICES (wait for databases before starting)
  # ============================================================================

  # Customer Service - Manages customer data
  customer-service:
    image: ghcr.io/${GITHUB_REPOSITORY}/customer-service:${CI_TEST_TAG}
    container_name: fbpage-mm-test-customer-service
    restart: "no"
    ports:
      - "${TEST_CUSTOMER_SERVICE_PORT:-3101}:3001"
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@customer-db:5432/${CUSTOMER_SERVICE_DB:-customer_service}
      - DATABASE_MAX_CONNECTIONS=10
      - BIND_ADDRESS=0.0.0.0:3001
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      - RUST_BACKTRACE=1
      - RUST_LOG=debug
    depends_on:
      customer-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - fbpage-mm-test-network

  # Message Service - Stores messages from Facebook
  message-service:
    image: ghcr.io/${GITHUB_REPOSITORY}/message-service:${CI_TEST_TAG}
    container_name: fbpage-mm-test-message-service
    restart: "no"
    ports:
      - "${TEST_MESSAGE_SERVICE_PORT:-3102}:3002"
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@message-db:5432/${MESSAGE_SERVICE_DB:-message_service}
      - DATABASE_MAX_CONNECTIONS=10
      - BIND_ADDRESS=0.0.0.0:3002
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      - RUST_BACKTRACE=1
      - RUST_LOG=debug
      - CUSTOMER_SERVICE_URL=http://customer-service:3001
    depends_on:
      message-db:
        condition: service_healthy
      customer-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3002/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - fbpage-mm-test-network

  # Facebook Graph Service - Fetches messages from Facebook API
  facebook-graph-service:
    image: ghcr.io/${GITHUB_REPOSITORY}/facebook-graph-service:${CI_TEST_TAG}
    container_name: fbpage-mm-test-facebook-graph-service
    restart: "no"
    ports:
      - "${TEST_FACEBOOK_GRAPH_SERVICE_PORT:-3103}:3003"
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@facebook-db:5432/${FACEBOOK_GRAPH_DB:-facebook_graph}
      - BIND_ADDRESS=0.0.0.0:3003
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      - RUST_BACKTRACE=1
      - RUST_LOG=debug
      # Facebook API credentials (can be test/empty for integration tests)
      - FACEBOOK_PAGE_ID=${FACEBOOK_PAGE_ID:-test_page_id}
      - FACEBOOK_PAGE_ACCESS_TOKEN=${FACEBOOK_PAGE_ACCESS_TOKEN:-test_token}
      - FACEBOOK_APP_ID=${FACEBOOK_APP_ID:-test_app_id}
      - FACEBOOK_APP_SECRET=${FACEBOOK_APP_SECRET:-test_secret}
      - CUSTOMER_SERVICE_URL=http://customer-service:3001
      - MESSAGE_SERVICE_URL=http://message-service:3002
    depends_on:
      facebook-db:
        condition: service_healthy
      customer-service:
        condition: service_healthy
      message-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3003/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - fbpage-mm-test-network

  # ============================================================================
  # TEST RUNNER SERVICE (orchestrates test execution)
  # ============================================================================

  test-runner:
    image: ghcr.io/${GITHUB_REPOSITORY}/test-runner:${CI_TEST_TAG}
    container_name: fbpage-mm-test-runner
    restart: "no"
    environment:
      # Database URLs for test verification
      - CUSTOMER_DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@customer-db:5432/${CUSTOMER_SERVICE_DB:-customer_service}
      - MESSAGE_DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@message-db:5432/${MESSAGE_SERVICE_DB:-message_service}
      - FACEBOOK_DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@facebook-db:5432/${FACEBOOK_GRAPH_DB:-facebook_graph}
      # DATABASE_URL for cargo test (customer-service integration tests)
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@customer-db:5432/${CUSTOMER_SERVICE_DB:-customer_service}
      # Service URLs for HTTP testing
      - CUSTOMER_SERVICE_URL=http://customer-service:3001
      - MESSAGE_SERVICE_URL=http://message-service:3002
      - FACEBOOK_GRAPH_SERVICE_URL=http://facebook-graph-service:3003
      # Test configuration
      - TEST_LOG_LEVEL=${TEST_LOG_LEVEL:-debug}
      - WAIT_TIMEOUT=300
    depends_on:
      customer-service:
        condition: service_healthy
      message-service:
        condition: service_healthy
      facebook-graph-service:
        condition: service_healthy
    networks:
      - fbpage-mm-test-network

networks:
  fbpage-mm-test-network:
    driver: bridge
