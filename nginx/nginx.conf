server {
    listen 80;
    server_name _;

    # Redirect HTTP to HTTPS (for ACME challenges and initial setup)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name _;

    # SSL Certificate (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Client body size (Facebook webhooks can be larger)
    client_max_body_size 10M;

    # Facebook Webhook endpoint
    location /webhook/facebook {
        # Pass to facebook-graph-service which handles:
        # - GET: hub.mode, hub.verify_token, hub.challenge verification
        # - POST: X-Hub-Signature-256 HMAC validation
        proxy_pass http://facebook-graph-service:3003/webhook/facebook;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for webhook processing
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Disable buffering for streaming responses
        proxy_request_buffering off;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://facebook-graph-service:3003/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Default: deny all else
    location / {
        return 404;
    }
}
