# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
      - id: check-executables-have-shebangs
      - id: check-json
        exclude: '\.vscode/(cSpell|extensions)\.json'
      - id: check-shebang-scripts-are-executable
        exclude: '.+\.rs'
      - id: check-symlinks
      - id: check-toml
      - id: check-yaml
        args: [ --allow-multiple-documents ]
      - id: destroyed-symlinks
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [ --fix=lf ]
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: rust-linting
        name: Rust linting
        description: Run cargo fmt on files included in the commit.
        entry: cargo fmt --
        pass_filenames: true
        types: [file, rust]
        language: system
      - id: rust-clippy
        name: Rust clippy
        description: Run cargo clippy on files included in the commit.
        entry: cargo clippy --workspace --all-targets --all-features -- -D warnings
        pass_filenames: false
        types: [file, rust]
        language: system
      - id: codespell
        name: Code spell checker (codespell)
        description: Run codespell to check for spelling errors (if available).
        entry: bash -c 'if command -v codespell >/dev/null 2>&1; then codespell --no-must-find-files -- "$@"; else echo "codespell not found, skipping spell check"; exit 0; fi' --
        pass_filenames: true
        language: system
