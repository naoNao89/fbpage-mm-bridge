name: Deploy Mattermost (Docker Compose)

on:
  push:
    branches: [ "main", "dev/**" ]
    paths:
      - 'services/**'
      - 'docker-compose.yml'
      - 'nginx/**'
      - 'Dockerfile.nginx'
      - '.github/workflows/deploy-mattermost.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_TAG: ${{ github.sha }}
  GHCR_OWNER: ${{ github.repository_owner }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_refs: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase owner
        run: |
          echo "GHCR_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Cargo dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Extract metadata for Docker images
        id: meta
        run: |
          echo "tags=ghcr.io/${{ env.GHCR_OWNER }}/fbpage-mm-bridge/customer-service:${{ env.IMAGE_TAG }},ghcr.io/${{ env.GHCR_OWNER }}/fbpage-mm-bridge/customer-service:latest" >> $GITHUB_OUTPUT
          echo "tags=ghcr.io/${{ env.GHCR_OWNER }}/fbpage-mm-bridge/message-service:${{ env.IMAGE_TAG }},ghcr.io/${{ env.GHCR_OWNER }}/fbpage-mm-bridge/message-service:latest" >> $GITHUB_OUTPUT
          echo "tags=ghcr.io/${{ env.GHCR_OWNER }}/fbpage-mm-bridge/facebook-graph-service:${{ env.IMAGE_TAG }},ghcr.io/${{ env.GHCR_OWNER }}/fbpage-mm-bridge/facebook-graph-service:latest" >> $GITHUB_OUTPUT

      - name: Build and push Customer Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/customer-service/Dockerfile
          push: true
          tags: ghcr.io/${{ env.GHCR_OWNER }}/fbpage-mm-bridge/customer-service:${{ env.IMAGE_TAG }},ghcr.io/${{ env.GHCR_OWNER }}/fbpage-mm-bridge/customer-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Build and push Message Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/message-service/Dockerfile
          push: true
          tags: ghcr.io/${{ env.GHCR_OWNER }}/fbpage-mm-bridge/message-service:${{ env.IMAGE_TAG }},ghcr.io/${{ env.GHCR_OWNER }}/fbpage-mm-bridge/message-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Build and push Facebook Graph Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/facebook-graph-service/Dockerfile
          push: true
          tags: ghcr.io/${{ env.GHCR_OWNER }}/fbpage-mm-bridge/facebook-graph-service:${{ env.IMAGE_TAG }},ghcr.io/${{ env.GHCR_OWNER }}/fbpage-mm-bridge/facebook-graph-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  deploy:
    runs-on: ubuntu-latest
    needs: [build]
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase owner
        run: |
          echo "GHCR_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H -p 22 ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Write deploy env to server
        env:
          MM_DOMAIN: ${{ secrets.MM_DOMAIN }}
          MM_SITE_URL: ${{ secrets.MM_SITE_URL }}
          MM_ADMIN_EMAIL: ${{ secrets.MM_ADMIN_EMAIL }}
          MM_ADMIN_USERNAME: ${{ secrets.MM_ADMIN_USERNAME }}
          MM_BOT_USERNAME: ${{ secrets.MM_BOT_USERNAME }}
          MM_BOT_DISPLAY_NAME: ${{ secrets.MM_BOT_DISPLAY_NAME }}
          MM_BOT_DESCRIPTION: ${{ secrets.MM_BOT_DESCRIPTION }}
          MM_ADMIN_PASSWORD: ${{ secrets.MM_ADMIN_PASSWORD }}
          WEBHOOK_DOMAIN: ${{ secrets.WEBHOOK_DOMAIN }}
          FACEBOOK_WEBHOOK_VERIFY_TOKEN: ${{ secrets.FACEBOOK_WEBHOOK_VERIFY_TOKEN }}
          SSL_EMAIL: ${{ secrets.SSL_EMAIL }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          cat << ENVOF | ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} "cat > /tmp/deploy-env.sh"
          export MM_DOMAIN='$MM_DOMAIN'
          export MM_SITE_URL='$MM_SITE_URL'
          export MM_ADMIN_EMAIL='$MM_ADMIN_EMAIL'
          export MM_ADMIN_USERNAME='$MM_ADMIN_USERNAME'
          export MM_BOT_USERNAME='$MM_BOT_USERNAME'
          export MM_BOT_DISPLAY_NAME='$MM_BOT_DISPLAY_NAME'
          export MM_BOT_DESCRIPTION='$MM_BOT_DESCRIPTION'
          export MM_ADMIN_PASSWORD='$MM_ADMIN_PASSWORD'
          export WEBHOOK_DOMAIN='$WEBHOOK_DOMAIN'
          export FACEBOOK_WEBHOOK_VERIFY_TOKEN='$FACEBOOK_WEBHOOK_VERIFY_TOKEN'
          export SSL_EMAIL='$SSL_EMAIL'
          export REPO='$REPO'
          export BRANCH='$BRANCH'
          export IMAGE_TAG='$IMAGE_TAG'
          ENVOF

      - name: Deploy via SSH
        run: |
          ssh -i ~/.ssh/deploy_key -o ServerAliveInterval=30 -o ServerAliveCountMax=120 ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} bash << 'EOF'
            set -euo pipefail
            source /tmp/deploy-env.sh
            export NGINX_BIND_IP="$(ip -4 addr show dev eth0 2>/dev/null | grep "inet " | awk '{print $2}' | cut -d/ -f1 | grep -v "^10\." | grep -v "^172\." | grep -v "^192\.168\." | head -1 || echo 0.0.0.0)"
            echo "=== DEBUG: NGINX_BIND_IP=$NGINX_BIND_IP ==="
            echo "=== DEBUG: ip addr eth0 ==="
            ip -4 addr show dev eth0 2>/dev/null || echo "eth0 not found"
            export USER="${USER:-$(whoami)}"

            export STACK_DIR="/opt/mattermost"
            export SECRETS_DIR="$STACK_DIR/secrets"
            export ADMIN_PW_FILE_HOST="$SECRETS_DIR/admin_password"
            export ADMIN_PW_FILE_IN_CONTAINER="/mattermost/config/bootstrap_admin_password"

            sudo mkdir -p "$STACK_DIR" "$SECRETS_DIR"
            sudo chown -R "$USER":"$USER" "$STACK_DIR"

            if [ ! -d "$STACK_DIR/.git" ]; then
              if [ -d "$STACK_DIR" ] && [ -n "$(ls -A "$STACK_DIR" 2>/dev/null)" ]; then
                echo "Warning: $STACK_DIR exists but is not a git repo. Removing and re-cloning."
                rm -rf "$STACK_DIR"
              fi
              git clone --depth=1 https://github.com/$REPO "$STACK_DIR"
            else
              cd "$STACK_DIR"
              git fetch --depth=1 origin "$BRANCH"
              git reset --hard FETCH_HEAD
            fi
            cd "$STACK_DIR"

            if [ -n "$MM_ADMIN_PASSWORD" ]; then
              echo "Using MM_ADMIN_PASSWORD from GitHub Secrets."
              printf "%s" "$MM_ADMIN_PASSWORD" > "$ADMIN_PW_FILE_HOST"
              chmod 600 "$ADMIN_PW_FILE_HOST"
            else
              if [ -f "$ADMIN_PW_FILE_HOST" ]; then
                export MM_ADMIN_PASSWORD="$(cat "$ADMIN_PW_FILE_HOST")"
                echo "Reusing existing generated admin password from $ADMIN_PW_FILE_HOST"
              else
                export MM_ADMIN_PASSWORD="$(openssl rand -base64 36 | tr -d '\n' | tr '+/' '-_' | cut -c1-24)"
                printf "%s" "$MM_ADMIN_PASSWORD" > "$ADMIN_PW_FILE_HOST"
                chmod 600 "$ADMIN_PW_FILE_HOST"
                echo "Generated new admin password and stored at $ADMIN_PW_FILE_HOST"
              fi
            fi

            if [ ! -f .env ]; then
              cp .env.example .env || true
            fi

            # Pull pre-built images from GHCR instead of building locally
            export GHCR_OWNER="${{ env.GHCR_OWNER }}"
            docker compose -f docker-compose.yml pull

            # Stop containers from any previous deployment
            docker rm -f customer-service message-service facebook-graph-service fbpage-mm-bridge customer-service-db message-service-db facebook-graph-service-db fbpage-mm-bridge-db 2>/dev/null || true
            docker compose down --remove-orphans 2>/dev/null || true
            docker compose up -d

            echo "=== DEBUG: nginx container ==="
            docker ps -a --filter name=nginx --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'
            docker logs nginx 2>&1 | tail -20
            ss -tlnp 'sport = :80' 2>/dev/null || echo "Port 80 not listening"
            ss -tlnp 'sport = :443' 2>/dev/null || echo "Port 443 not listening"

            MM_CONTAINER_ID="$(docker compose ps -q mattermost)"
            if [ -n "$MM_CONTAINER_ID" ]; then
              echo "Admin password stored on server at: $ADMIN_PW_FILE_HOST"
            else
              echo "WARNING: Could not find Mattermost container"
            fi

            bash ./scripts/bootstrap-mm.sh

            # Post-deploy health checks
            echo ""
            echo "=== Post-Deploy Health Check ==="
            echo ""

            # Wait for containers to start and initialize
            sleep 15

            # Check all containers are running
            echo "Container status:"
            docker compose ps

            # Verify each service via Docker healthcheck
            echo ""
            echo "Service health checks:"

            HEALTH_CHECK_FAILED=false

            for service in customer-service message-service facebook-graph-service; do
              CONTAINER_STATUS=$(docker inspect --format='{{.State.Health.Status}}' "$service" 2>/dev/null || echo "no-healthcheck")
              if [ "$CONTAINER_STATUS" = "healthy" ]; then
                echo "[PASS] $service: healthy"
              elif [ "$CONTAINER_STATUS" = "starting" ]; then
                echo "[WAIT] $service: still starting (waiting...)"
                sleep 10
                CONTAINER_STATUS=$(docker inspect --format='{{.State.Health.Status}}' "$service" 2>/dev/null || echo "no-healthcheck")
                if [ "$CONTAINER_STATUS" = "healthy" ]; then
                  echo "[PASS] $service: healthy"
                else
                  echo "[FAIL] $service: unhealthy (status: $CONTAINER_STATUS)"
                  docker compose logs --tail=30 "$service"
                  HEALTH_CHECK_FAILED=true
                fi
              elif [ "$CONTAINER_STATUS" = "unhealthy" ]; then
                echo "[FAIL] $service: UNHEALTHY"
                docker compose logs --tail=30 "$service"
                HEALTH_CHECK_FAILED=true
              else
                # Fallback: check if process is running
                if docker compose ps "$service" | grep -q "Up"; then
                  echo "[PASS] $service: running (no healthcheck available)"
                else
                  echo "[FAIL] $service: NOT running"
                  docker compose logs --tail=30 "$service"
                  HEALTH_CHECK_FAILED=true
                fi
              fi
            done

            # Check Mattermost
            MM_CONTAINER_ID="$(docker compose ps -q mattermost)"
            if [ -n "$MM_CONTAINER_ID" ]; then
              echo "[PASS] mattermost: running"
            else
              echo "[FAIL] mattermost: NOT running"
              docker compose logs --tail=30 mattermost
              HEALTH_CHECK_FAILED=true
            fi

            if [ "$HEALTH_CHECK_FAILED" = true ]; then
              echo ""
              echo "=== Health check FAILED ==="
              exit 1
            fi

            echo ""
            echo "=== All services healthy ==="
            echo "Deploy complete"
          EOF
