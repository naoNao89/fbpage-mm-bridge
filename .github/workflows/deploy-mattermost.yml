name: Deploy Mattermost (Docker Compose)

on:
  push:
    branches: [ "main", "dev/**" ]
    paths:
      - 'services/**'
      - 'docker-compose.yml'
      - 'nginx/**'
      - 'Dockerfile.nginx'
      - '.github/workflows/deploy-mattermost.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE_TAG: ${{ github.sha }}
  GHCR_OWNER: ${{ github.repository_owner }}

jobs:
  # ─── Detect which paths changed ───────────────────────────────────────
  detect-changes:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    outputs:
      customer: ${{ steps.filter.outputs.customer-service }}
      message: ${{ steps.filter.outputs.message-service }}
      facebook: ${{ steps.filter.outputs.facebook-graph-service }}
      mm-bridge-bot: ${{ steps.filter.outputs.mm-bridge-bot }}
      nginx: ${{ steps.filter.outputs.nginx }}
      shared: ${{ steps.filter.outputs.shared }}
      any-service: ${{ steps.filter.outputs.any-service }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            customer-service:
              - 'services/customer-service/**'
            message-service:
              - 'services/message-service/**'
            facebook-graph-service:
              - 'services/facebook-graph-service/**'
            mm-bridge-bot:
              - 'services/mm-bridge-bot/**'
            nginx:
              - 'nginx/**'
              - 'Dockerfile.nginx'
            shared:
              - 'src/**'
              - 'utils/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'docker-compose.yml'
              - 'docker-bake.hcl'
            any-service:
              - 'services/customer-service/**'
              - 'services/message-service/**'
              - 'services/facebook-graph-service/**'
              - 'services/mm-bridge-bot/**'
              - 'src/**'
              - 'utils/**'
              - 'Cargo.toml'
              - 'Cargo.lock'

  # ─── Build Customer Service (conditional) ─────────────────────────────
  build-customer:
    needs: detect-changes
    if: needs.detect-changes.outputs.customer == 'true' || needs.detect-changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase owner
        run: |
          echo "GHCR_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Cargo dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build and push Customer Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/customer-service/Dockerfile
          push: true
          tags: ghcr.io/${{ env.GHCR_OWNER }}/fbpage-mm-bridge/customer-service:${{ env.IMAGE_TAG }},ghcr.io/${{ env.GHCR_OWNER }}/fbpage-mm-bridge/customer-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ─── Build Message Service (conditional) ──────────────────────────────
  build-message:
    needs: detect-changes
    if: needs.detect-changes.outputs.message == 'true' || needs.detect-changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase owner
        run: |
          echo "GHCR_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Cargo dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build and push Message Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/message-service/Dockerfile
          push: true
          tags: ghcr.io/${{ env.GHCR_OWNER }}/fbpage-mm-bridge/message-service:${{ env.IMAGE_TAG }},ghcr.io/${{ env.GHCR_OWNER }}/fbpage-mm-bridge/message-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ─── Build Facebook Graph Service (conditional) ───────────────────────
  build-facebook:
    needs: detect-changes
    if: needs.detect-changes.outputs.facebook == 'true' || needs.detect-changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase owner
        run: |
          echo "GHCR_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Cargo dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build and push Facebook Graph Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/facebook-graph-service/Dockerfile
          push: true
          tags: ghcr.io/${{ env.GHCR_OWNER }}/fbpage-mm-bridge/facebook-graph-service:${{ env.IMAGE_TAG }},ghcr.io/${{ env.GHCR_OWNER }}/fbpage-mm-bridge/facebook-graph-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  build-mm-bridge-bot:
    needs: detect-changes
    if: needs.detect-changes.outputs.mm-bridge-bot == 'true' || needs.detect-changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase owner
        run: |
          echo "GHCR_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Cargo dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build and push mm-bridge-bot
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/mm-bridge-bot/Dockerfile
          push: true
          tags: ghcr.io/${{ env.GHCR_OWNER }}/fbpage-mm-bridge/mm-bridge-bot:${{ env.IMAGE_TAG }},ghcr.io/${{ env.GHCR_OWNER }}/fbpage-mm-bridge/mm-bridge-bot:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  deploy:
    needs: [detect-changes, build-customer, build-message, build-facebook, build-mm-bridge-bot]
    if: |
      always() &&
      needs.detect-changes.result == 'success' &&
      (needs.detect-changes.outputs.customer == 'true' ||
       needs.detect-changes.outputs.message == 'true' ||
       needs.detect-changes.outputs.facebook == 'true' ||
       needs.detect-changes.outputs.mm-bridge-bot == 'true' ||
       needs.detect-changes.outputs.nginx == 'true' ||
       needs.detect-changes.outputs.shared == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase owner
        run: |
          echo "GHCR_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H -p 22 ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Write deploy env to server
        env:
          MM_DOMAIN: ${{ secrets.MM_DOMAIN }}
          MM_SITE_URL: ${{ secrets.MM_SITE_URL }}
          MM_ADMIN_EMAIL: ${{ secrets.MM_ADMIN_EMAIL }}
          MM_ADMIN_USERNAME: ${{ secrets.MM_ADMIN_USERNAME }}
          MM_BOT_USERNAME: ${{ secrets.MM_BOT_USERNAME }}
          MM_BOT_DISPLAY_NAME: ${{ secrets.MM_BOT_DISPLAY_NAME }}
          MM_BOT_DESCRIPTION: ${{ secrets.MM_BOT_DESCRIPTION }}
          MM_ADMIN_PASSWORD: ${{ secrets.MM_ADMIN_PASSWORD }}
          MATTERMOST_PASSWORD: ${{ secrets.MM_ADMIN_PASSWORD }}
          WEBHOOK_DOMAIN: ${{ secrets.WEBHOOK_DOMAIN }}
          FACEBOOK_WEBHOOK_VERIFY_TOKEN: ${{ secrets.FACEBOOK_WEBHOOK_VERIFY_TOKEN }}
          SSL_EMAIL: ${{ secrets.SSL_EMAIL }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          BUILD_CUSTOMER: ${{ needs.build-customer.result }}
          BUILD_MESSAGE: ${{ needs.build-message.result }}
          BUILD_FACEBOOK: ${{ needs.build-facebook.result }}
          BUILD_MM_BRIDGE_BOT: ${{ needs.build-mm-bridge-bot.result }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          FACEBOOK_APP_ID: ${{ secrets.FACEBOOK_APP_ID }}
          FACEBOOK_APP_SECRET: ${{ secrets.FACEBOOK_APP_SECRET }}
        run: |
          cat << ENVOF | ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} "cat > /tmp/deploy-env.sh"
          export MM_DOMAIN='$MM_DOMAIN'
          export MM_SITE_URL='$MM_SITE_URL'
          export MM_ADMIN_EMAIL='$MM_ADMIN_EMAIL'
          export MM_ADMIN_USERNAME='$MM_ADMIN_USERNAME'
          export MM_BOT_USERNAME='$MM_BOT_USERNAME'
          export MM_BOT_DISPLAY_NAME='$MM_BOT_DISPLAY_NAME'
          export MM_BOT_DESCRIPTION='$MM_BOT_DESCRIPTION'
          export MM_ADMIN_PASSWORD='$MM_ADMIN_PASSWORD'
          export MATTERMOST_PASSWORD='$MATTERMOST_PASSWORD'
          export WEBHOOK_DOMAIN='$WEBHOOK_DOMAIN'
          export FACEBOOK_WEBHOOK_VERIFY_TOKEN='$FACEBOOK_WEBHOOK_VERIFY_TOKEN'
          export SSL_EMAIL='$SSL_EMAIL'
          export REPO='$REPO'
          export BRANCH='$BRANCH'
          export IMAGE_TAG='$IMAGE_TAG'
          export BUILD_CUSTOMER='$BUILD_CUSTOMER'
          export BUILD_MESSAGE='$BUILD_MESSAGE'
          export BUILD_FACEBOOK='$BUILD_FACEBOOK'
          export BUILD_MM_BRIDGE_BOT='$BUILD_MM_BRIDGE_BOT'
          export POSTGRES_PASSWORD='$POSTGRES_PASSWORD'
          export FACEBOOK_PAGE_ID='$FACEBOOK_PAGE_ID'
          export FACEBOOK_PAGE_ACCESS_TOKEN='$FACEBOOK_PAGE_ACCESS_TOKEN'
          export FACEBOOK_APP_ID='$FACEBOOK_APP_ID'
          export FACEBOOK_APP_SECRET='$FACEBOOK_APP_SECRET'
          ENVOF

      - name: Deploy via SSH
        run: |
          ssh -i ~/.ssh/deploy_key -o ServerAliveInterval=30 -o ServerAliveCountMax=120 ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} bash << 'EOF'
            set -uo pipefail
            source /tmp/deploy-env.sh
            export NGINX_BIND_IP="$(ip -4 addr show dev eth0 2>/dev/null | grep "inet " | awk '{print $2}' | cut -d/ -f1 | grep -v "^10\." | grep -v "^172\." | grep -v "^192\.168\." | head -1 || echo 0.0.0.0)"
            echo "=== DEBUG: NGINX_BIND_IP=$NGINX_BIND_IP ==="
            echo "=== DEBUG: ip addr eth0 ==="
            ip -4 addr show dev eth0 2>/dev/null || echo "eth0 not found"
            export USER="${USER:-$(whoami)}"

            export STACK_DIR="/opt/mattermost"
            export SECRETS_DIR="$STACK_DIR/secrets"
            export ADMIN_PW_FILE_HOST="$SECRETS_DIR/admin_password"
            export ADMIN_PW_FILE_IN_CONTAINER="/mattermost/config/bootstrap_admin_password"

            sudo mkdir -p "$STACK_DIR" "$SECRETS_DIR"
            sudo chown -R "$USER":"$USER" "$STACK_DIR"

            if [ ! -d "$STACK_DIR/.git" ]; then
              if [ -d "$STACK_DIR" ] && [ -n "$(ls -A "$STACK_DIR" 2>/dev/null)" ]; then
                echo "Warning: $STACK_DIR exists but is not a git repo. Removing and re-cloning."
                rm -rf "$STACK_DIR"
              fi
              git clone --depth=1 https://github.com/$REPO "$STACK_DIR"
            else
              cd "$STACK_DIR"
              git fetch --depth=1 origin "$BRANCH"
              git reset --hard FETCH_HEAD
            fi
            cd "$STACK_DIR"

            if [ -n "$MM_ADMIN_PASSWORD" ]; then
              echo "Using MM_ADMIN_PASSWORD from GitHub Secrets."
              printf "%s" "$MM_ADMIN_PASSWORD" > "$ADMIN_PW_FILE_HOST"
              chmod 600 "$ADMIN_PW_FILE_HOST"
            else
              if [ -f "$ADMIN_PW_FILE_HOST" ]; then
                export MM_ADMIN_PASSWORD="$(cat "$ADMIN_PW_FILE_HOST")"
                echo "Reusing existing generated admin password from $ADMIN_PW_FILE_HOST"
              else
                export MM_ADMIN_PASSWORD="$(openssl rand -base64 36 | tr -d '\n' | tr '+/' '-_' | cut -c1-24)"
                printf "%s" "$MM_ADMIN_PASSWORD" > "$ADMIN_PW_FILE_HOST"
                chmod 600 "$ADMIN_PW_FILE_HOST"
                echo "Generated new admin password and stored at $ADMIN_PW_FILE_HOST"
              fi
            fi

            python3 scripts/update-env.py

            # Fix bind-mount paths that Docker may have auto-created as directories
            # (happens when git checkout is missing the file but docker compose already ran)
            for f in nginx/nginx.conf secrets/admin_password; do
              if [ -d "$f" ]; then
                echo "Fixing auto-created directory: $f -> removing"
                rm -rf "$f"
              fi
            done
            mkdir -p secrets nginx certs

            # Copy SSL certificates from Let's Encrypt (where certbot stores them) to repo dir
            if [ -d "/etc/letsencrypt/live/${WEBHOOK_DOMAIN}" ]; then
              cp "/etc/letsencrypt/live/${WEBHOOK_DOMAIN}/fullchain.pem" certs/ 2>/dev/null || true
              cp "/etc/letsencrypt/live/${WEBHOOK_DOMAIN}/privkey.pem" certs/ 2>/dev/null || true
            fi
            if [ ! -f "certs/fullchain.pem" ] || [ ! -f "certs/privkey.pem" ]; then
              echo "WARNING: SSL certificates not found. Generating self-signed certs for nginx."
              openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
                -keyout certs/privkey.pem -out certs/fullchain.pem \
                -subj "/CN=${WEBHOOK_DOMAIN:-localhost}" 2>/dev/null || true
            fi

            export GHCR_OWNER="${GHCR_OWNER:-naonao89}"

            # ─── Smart pull: only pull services that were NOT rebuilt ────
            # Services that were rebuilt already have the latest image pushed to GHCR.
            # Services that were skipped need their existing GHCR image pulled.
            PULL_SERVICES=()

            if [ "$BUILD_CUSTOMER" != "success" ]; then
              PULL_SERVICES+=("customer-service")
              echo "[SKIP BUILD] customer-service unchanged — will pull existing GHCR image"
            else
              echo "[BUILD] customer-service was rebuilt — using pushed image"
            fi

            if [ "$BUILD_MESSAGE" != "success" ]; then
              PULL_SERVICES+=("message-service")
              echo "[SKIP BUILD] message-service unchanged — will pull existing GHCR image"
            else
              echo "[BUILD] message-service was rebuilt — using pushed image"
            fi

            if [ "$BUILD_FACEBOOK" != "success" ]; then
              PULL_SERVICES+=("facebook-graph-service")
              echo "[SKIP BUILD] facebook-graph-service unchanged — will pull existing GHCR image"
            else
              echo "[BUILD] facebook-graph-service was rebuilt — using pushed image"
            fi

            if [ "$BUILD_MM_BRIDGE_BOT" != "success" ]; then
              PULL_SERVICES+=("mm-bridge-bot")
              echo "[SKIP BUILD] mm-bridge-bot unchanged — will pull existing GHCR image"
            else
              echo "[BUILD] mm-bridge-bot was rebuilt — using pushed image"
            fi

            echo "Pulling ALL service images from GHCR..."
            docker compose pull 2>/dev/null || echo "Warning: docker compose pull had errors (continuing)"

            # Ensure the Docker network exists before compose up
            docker network inspect mattermost_fbpage-mm-network >/dev/null 2>&1 || \
              docker network create mattermost_fbpage-mm-network

            docker compose down --remove-orphans --timeout 30 || echo "Warning: docker compose down failed (continuing)"

            # Nuclear cleanup: stop ALL containers on this dedicated deploy VPS
            # This handles port conflicts from previous deploys with different compose project names
            echo "Stopping all containers on VPS..."
            docker stop $(docker ps -q) 2>/dev/null || true
            docker rm -f $(docker ps -aq) 2>/dev/null || true

            sleep 5

            echo "Running docker compose up -d --force-recreate..."
            if ! docker compose up -d --force-recreate; then
              echo "ERROR: docker compose up failed!"
              docker compose ps
              docker compose logs --tail=20
              exit 1
            fi
            echo "docker compose up -d completed successfully"

            echo "Waiting for containers to be created..."
            for i in $(seq 1 30); do
              RUNNING=$(docker compose ps --format '{{.Names}}' 2>/dev/null | wc -l)
              if [ "$RUNNING" -ge 10 ]; then
                echo "All $RUNNING containers created, waiting for startup..."
                break
              fi
              echo "Waiting... ($i/30) containers running: $RUNNING"
              sleep 2
            done

            echo "Waiting additional 60s for services to initialize..."
            sleep 60

            echo "=== DEBUG: service containers ==="
            docker compose logs customer-service 2>&1 | tail -30
            docker compose logs message-service 2>&1 | tail -30
            docker compose logs facebook-graph-service 2>&1 | tail -30

            echo "=== DEBUG: nginx container ==="
            docker compose ps nginx
            docker compose logs nginx 2>&1 | tail -20
            ss -tlnp 'sport = :80' 2>/dev/null || echo "Port 80 not listening"
            ss -tlnp 'sport = :443' 2>/dev/null || echo "Port 443 not listening"

            MM_CONTAINER_ID="$(docker compose ps -q mattermost)"
            if [ -n "$MM_CONTAINER_ID" ]; then
              echo "Admin password stored on server at: $ADMIN_PW_FILE_HOST"
            else
              echo "WARNING: Could not find Mattermost container"
            fi

            bash ./scripts/bootstrap-mm.sh

            # Post-deploy health checks
            echo ""
            echo "=== Post-Deploy Health Check ==="
            echo ""

            # Wait for containers to start and initialize
            sleep 15

            # Check all containers are running
            echo "Container status:"
            docker compose ps

            # Verify each service via Docker healthcheck
            echo ""
            echo "Service health checks:"

            HEALTH_CHECK_FAILED=false

            for service in customer-service message-service facebook-graph-service mm-bridge-bot; do
              for attempt in $(seq 1 12); do
                CONTAINER_ID=$(docker compose ps -q "$service" 2>/dev/null || true)
                if [ -n "$CONTAINER_ID" ]; then
                  CONTAINER_STATUS=$(docker inspect --format='{{.State.Health.Status}}' "$CONTAINER_ID" 2>/dev/null || echo "no-healthcheck")
                  if [ "$CONTAINER_STATUS" = "healthy" ] || [ "$CONTAINER_STATUS" = "no-healthcheck" ]; then
                    echo "[PASS] $service: ready"
                    break
                  elif [ "$CONTAINER_STATUS" = "unhealthy" ]; then
                    echo "[FAIL] $service: unhealthy"
                    docker compose logs --tail=5 "$service"
                    break
                  fi
                fi
                if [ $attempt -eq 12 ]; then
                  echo "[FAIL] $service: not healthy after 12 attempts"
                else
                  echo "[WAIT] $service: attempt $attempt/12"
                  sleep 5
                fi
              done
            done

            # Check Mattermost
            MM_CONTAINER_ID="$(docker compose ps -q mattermost)"
            if [ -n "$MM_CONTAINER_ID" ]; then
              echo "[PASS] mattermost: running"
            else
              echo "[WARN] mattermost: NOT running (continuing anyway)"
            fi

            echo ""
            echo "=== Reloading nginx to refresh upstream DNS ==="
            docker exec mattermost-nginx-1 nginx -s reload 2>/dev/null || echo "Warning: nginx reload failed"

            echo "=== Deploy complete (health check failures are non-fatal) ==="
            exit 0
          EOF
