name: Deploy Mattermost (Docker Compose)

on:
  push:
    branches: [ "main", "dev/**" ]
    paths:
      - 'services/**'
      - 'docker-compose.yml'
      - 'nginx/**'
      - 'Dockerfile.nginx'
      - '.github/workflows/deploy-mattermost.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE_TAG: ${{ github.sha }}
  GHCR_OWNER: ${{ github.repository_owner }}

jobs:
  # ─── Detect which paths changed ───────────────────────────────────────
  detect-changes:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    outputs:
      customer: ${{ steps.filter.outputs.customer-service }}
      message: ${{ steps.filter.outputs.message-service }}
      facebook: ${{ steps.filter.outputs.facebook-graph-service }}
      mm-bridge-bot: ${{ steps.filter.outputs.mm-bridge-bot }}
      nginx: ${{ steps.filter.outputs.nginx }}
      shared: ${{ steps.filter.outputs.shared }}
      any-service: ${{ steps.filter.outputs.any-service }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            customer-service:
              - 'services/customer-service/**'
            message-service:
              - 'services/message-service/**'
            facebook-graph-service:
              - 'services/facebook-graph-service/**'
            mm-bridge-bot:
              - 'services/mm-bridge-bot/**'
            nginx:
              - 'nginx/**'
              - 'Dockerfile.nginx'
            shared:
              - 'src/**'
              - 'utils/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'docker-compose.yml'
              - 'docker-bake.hcl'
            any-service:
              - 'services/customer-service/**'
              - 'services/message-service/**'
              - 'services/facebook-graph-service/**'
              - 'services/mm-bridge-bot/**'
              - 'src/**'
              - 'utils/**'
              - 'Cargo.toml'
              - 'Cargo.lock'

  # ─── Build Customer Service (conditional) ─────────────────────────────
  build-customer:
    needs: detect-changes
    if: needs.detect-changes.outputs.customer == 'true' || needs.detect-changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase owner
        run: |
          echo "GHCR_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Cargo dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build and push Customer Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/customer-service/Dockerfile
          push: true
          tags: ghcr.io/${{ env.GHCR_OWNER }}/fbpage-mm-bridge/customer-service:${{ env.IMAGE_TAG }},ghcr.io/${{ env.GHCR_OWNER }}/fbpage-mm-bridge/customer-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ─── Build Message Service (conditional) ──────────────────────────────
  build-message:
    needs: detect-changes
    if: needs.detect-changes.outputs.message == 'true' || needs.detect-changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase owner
        run: |
          echo "GHCR_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Cargo dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build and push Message Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/message-service/Dockerfile
          push: true
          tags: ghcr.io/${{ env.GHCR_OWNER }}/fbpage-mm-bridge/message-service:${{ env.IMAGE_TAG }},ghcr.io/${{ env.GHCR_OWNER }}/fbpage-mm-bridge/message-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ─── Build Facebook Graph Service (conditional) ───────────────────────
  build-facebook:
    needs: detect-changes
    if: needs.detect-changes.outputs.facebook == 'true' || needs.detect-changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase owner
        run: |
          echo "GHCR_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Cargo dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build and push Facebook Graph Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/facebook-graph-service/Dockerfile
          push: true
          tags: ghcr.io/${{ env.GHCR_OWNER }}/fbpage-mm-bridge/facebook-graph-service:${{ env.IMAGE_TAG }},ghcr.io/${{ env.GHCR_OWNER }}/fbpage-mm-bridge/facebook-graph-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  build-mm-bridge-bot:
    needs: detect-changes
    if: needs.detect-changes.outputs.mm-bridge-bot == 'true' || needs.detect-changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase owner
        run: |
          echo "GHCR_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Cargo dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build and push mm-bridge-bot
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/mm-bridge-bot/Dockerfile
          push: true
          tags: ghcr.io/${{ env.GHCR_OWNER }}/fbpage-mm-bridge/mm-bridge-bot:${{ env.IMAGE_TAG }},ghcr.io/${{ env.GHCR_OWNER }}/fbpage-mm-bridge/mm-bridge-bot:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  deploy:
    needs: [detect-changes, build-customer, build-message, build-facebook, build-mm-bridge-bot]
    if: |
      always() &&
      needs.detect-changes.result == 'success' &&
      (needs.detect-changes.outputs.customer == 'true' ||
       needs.detect-changes.outputs.message == 'true' ||
       needs.detect-changes.outputs.facebook == 'true' ||
       needs.detect-changes.outputs.mm-bridge-bot == 'true' ||
       needs.detect-changes.outputs.nginx == 'true' ||
       needs.detect-changes.outputs.shared == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase owner
        run: |
          echo "GHCR_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H -p 22 ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy
        env:
          MM_DOMAIN: ${{ secrets.MM_DOMAIN }}
          MM_SITE_URL: ${{ secrets.MM_SITE_URL }}
          MM_ADMIN_EMAIL: ${{ secrets.MM_ADMIN_EMAIL }}
          MM_ADMIN_USERNAME: ${{ secrets.MM_ADMIN_USERNAME }}
          MM_BOT_USERNAME: ${{ secrets.MM_BOT_USERNAME }}
          MM_BOT_DISPLAY_NAME: ${{ secrets.MM_BOT_DISPLAY_NAME }}
          MM_BOT_DESCRIPTION: ${{ secrets.MM_BOT_DESCRIPTION }}
          MM_ADMIN_PASSWORD: ${{ secrets.MM_ADMIN_PASSWORD }}
          MATTERMOST_PASSWORD: ${{ secrets.MM_ADMIN_PASSWORD }}
          WEBHOOK_DOMAIN: ${{ secrets.WEBHOOK_DOMAIN }}
          FACEBOOK_WEBHOOK_VERIFY_TOKEN: ${{ secrets.FACEBOOK_WEBHOOK_VERIFY_TOKEN }}
          SSL_EMAIL: ${{ secrets.SSL_EMAIL }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          BUILD_CUSTOMER: ${{ needs.build-customer.result }}
          BUILD_MESSAGE: ${{ needs.build-message.result }}
          BUILD_FACEBOOK: ${{ needs.build-facebook.result }}
          BUILD_MM_BRIDGE_BOT: ${{ needs.build-mm-bridge-bot.result }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          FACEBOOK_APP_ID: ${{ secrets.FACEBOOK_APP_ID }}
          FACEBOOK_APP_SECRET: ${{ secrets.FACEBOOK_APP_SECRET }}
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} "cat > /tmp/deploy-env.sh" <<ENVOF
          export MM_DOMAIN="${MM_DOMAIN}"
          export MM_SITE_URL="${MM_SITE_URL}"
          export MM_ADMIN_EMAIL="${MM_ADMIN_EMAIL}"
          export MM_ADMIN_USERNAME="${MM_ADMIN_USERNAME}"
          export MM_BOT_USERNAME="${MM_BOT_USERNAME}"
          export MM_BOT_DISPLAY_NAME="${MM_BOT_DISPLAY_NAME}"
          export MM_BOT_DESCRIPTION="${MM_BOT_DESCRIPTION}"
          export MM_ADMIN_PASSWORD="${MM_ADMIN_PASSWORD}"
          export MATTERMOST_PASSWORD="${MATTERMOST_PASSWORD}"
          export WEBHOOK_DOMAIN="${WEBHOOK_DOMAIN}"
          export FACEBOOK_WEBHOOK_VERIFY_TOKEN="${FACEBOOK_WEBHOOK_VERIFY_TOKEN}"
          export SSL_EMAIL="${SSL_EMAIL}"
          export REPO="${REPO}"
          export BRANCH="${BRANCH}"
          export IMAGE_TAG="${IMAGE_TAG}"
          export BUILD_CUSTOMER="${BUILD_CUSTOMER}"
          export BUILD_MESSAGE="${BUILD_MESSAGE}"
          export BUILD_FACEBOOK="${BUILD_FACEBOOK}"
          export BUILD_MM_BRIDGE_BOT="${BUILD_MM_BRIDGE_BOT}"
          export POSTGRES_PASSWORD="${POSTGRES_PASSWORD}"
          export FACEBOOK_PAGE_ID="${FACEBOOK_PAGE_ID}"
          export FACEBOOK_PAGE_ACCESS_TOKEN="${FACEBOOK_PAGE_ACCESS_TOKEN}"
          export FACEBOOK_APP_ID="${FACEBOOK_APP_ID}"
          export FACEBOOK_APP_SECRET="${FACEBOOK_APP_SECRET}"
          ENVOF
          scp -i ~/.ssh/deploy_key scripts/deploy.sh ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:/tmp/deploy.sh
          ssh -i ~/.ssh/deploy_key -o ServerAliveInterval=30 -o ServerAliveCountMax=120 ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} "source /tmp/deploy-env.sh && bash /tmp/deploy.sh"
