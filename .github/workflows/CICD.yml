name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: "0"
  RUST_MIN_SRV: "1.83.0"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  spellcheck:
    name: Spell Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Run codespell
        uses: codespell-project/actions-codespell@v2
        with:
          skip: ".git,./.vscode,./target,./tests/fixtures"
          ignore-words-list: "crate"
          path: "."
          flags: "--write-changes"

  clippy:
    name: Clippy
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-latest
          - os: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            toolchain: stable
          - os: macos-latest
            toolchain: stable
          - os: windows-latest
            toolchain: stable
          - os: ubuntu-latest
            toolchain: nightly
          - os: macos-latest
            toolchain: nightly
          - os: windows-latest
            toolchain: nightly
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --workspace --all-features
      - name: Run tests
        run: cargo test --workspace --all-features --lib --bins

  cargo-deny:
    name: Cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: EmbarkStudios/cargo-deny-action@v2

  min_version:
    name: MSRV Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_MIN_SRV }}
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Check Cargo.lock is compatible with MSRV
        run: cargo fetch --locked --quiet
      - name: Build with MSRV
        run: cargo build --locked
      - name: Run tests with MSRV
        run: cargo test --locked

  doc_warnings:
    name: Documentation Warnings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check documentation warnings
        run: RUSTDOCFLAGS="-Dwarnings" cargo doc --workspace --no-deps --document-private-items

  test-services:
    name: Test services
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - customer-service
          - message-service
          - facebook-graph-service
        include:
          - service: customer-service
            db_name: customer_service
          - service: message-service
            db_name: message_service
          - service: facebook-graph-service
            db_name: facebook_graph
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Create database for ${{ matrix.service }}
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE ${{ matrix.db_name }};" || true
      - name: Check service ${{ matrix.service }}
        run: |
          cd services/${{ matrix.service }}
          cargo check
      - name: Format check ${{ matrix.service }}
        run: |
          cd services/${{ matrix.service }}
          cargo fmt -- --check
      - name: Clippy check ${{ matrix.service }}
        run: |
          cd services/${{ matrix.service }}
          cargo clippy -- -D warnings
      - name: Test ${{ matrix.service }}
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost/${{ matrix.db_name }}
        run: |
          cd services/${{ matrix.service }}
          cargo test

  docker-integration:
    name: Docker Integration
    runs-on: ubuntu-latest
    needs: [fmt, clippy, build, min_version]
    env:
      FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
      FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
      FACEBOOK_APP_ID: ${{ secrets.FACEBOOK_APP_ID }}
      FACEBOOK_APP_SECRET: ${{ secrets.FACEBOOK_APP_SECRET }}
      MATTERMOST_WEBHOOK_URL: ${{ secrets.MATTERMOST_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@v3

      - name: Build all services
        run: docker compose -f docker-compose.test.yml build

      - name: Start all services
        run: docker compose -f docker-compose.test.yml up -d

      - name: Wait for services to be healthy
        run: |
          timeout 300 bash -c '
            while ! docker compose -f docker-compose.test.yml ps --format json | grep -q "\"Health\":\"healthy\""; do
              sleep 10
            done
          '

      - name: Run integration tests
        run: |
          docker compose -f docker-compose.test.yml up test-runner --abort-on-container-exit --exit-code-from test-runner

      - name: Show service logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  build-and-push:
    name: Build and Push GHCR Images
    runs-on: ubuntu-latest
    needs: docker-integration
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and Push customer-service
        run: |
          docker buildx create --use || true
          docker buildx build --platform linux/amd64,linux/arm64 \
            -t ghcr.io/naoNao89/fbpage-mm-bridge/customer-service:latest \
            -t ghcr.io/naoNao89/fbpage-mm-bridge/customer-service:${{ github.sha }} \
            ./services/customer-service --pull --push
      - name: Build and Push message-service
        run: |
          docker buildx build --platform linux/amd64,linux/arm64 \
            -t ghcr.io/naoNao89/fbpage-mm-bridge/message-service:latest \
            -t ghcr.io/naoNao89/fbpage-mm-bridge/message-service:${{ github.sha }} \
            ./services/message-service --pull --push
      - name: Build and Push facebook-graph-service
        run: |
          docker buildx build --platform linux/amd64,linux/arm64 \
            -t ghcr.io/naoNao89/fbpage-mm-bridge/facebook-graph-service:latest \
            -t ghcr.io/naoNao89/fbpage-mm-bridge/facebook-graph-service:${{ github.sha }} \
            ./services/facebook-graph-service --pull --push
