services:
  # Customer Service - Manages customer data
  customer-service:
    build:
      context: ./services/customer-service
      dockerfile: Dockerfile
    container_name: customer-service
    restart: unless-stopped
    ports:
      - "${CUSTOMER_SERVICE_PORT:-3001}:3001"
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@customer-db:5432/${CUSTOMER_SERVICE_DB:-customer_service}
      - DATABASE_MAX_CONNECTIONS=10
      - BIND_ADDRESS=0.0.0.0:3001
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - RUST_BACKTRACE=1
    depends_on:
      customer-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - fbpage-mm-network

  # Message Service - Stores messages from Facebook
  message-service:
    build:
      context: ./services/message-service
      dockerfile: Dockerfile
    container_name: message-service
    restart: unless-stopped
    ports:
      - "${MESSAGE_SERVICE_PORT:-3002}:3002"
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@message-db:5432/${MESSAGE_SERVICE_DB:-message_service}
      - DATABASE_MAX_CONNECTIONS=10
      - BIND_ADDRESS=0.0.0.0:3002
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - RUST_BACKTRACE=1
      - CUSTOMER_SERVICE_URL=http://customer-service:3001
    depends_on:
      message-db:
        condition: service_healthy
      customer-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - fbpage-mm-network

  # Facebook Graph Service - Fetches messages from Facebook API
  facebook-graph-service:
    build:
      context: ./services/facebook-graph-service
      dockerfile: Dockerfile
    container_name: facebook-graph-service
    restart: unless-stopped
    ports:
      - "${FACEBOOK_GRAPH_SERVICE_PORT:-3003}:3003"
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@facebook-db:5432/${FACEBOOK_GRAPH_DB:-facebook_graph}
      - BIND_ADDRESS=0.0.0.0:3003
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - RUST_BACKTRACE=1
      - FACEBOOK_PAGE_ID=${FACEBOOK_PAGE_ID}
      - FACEBOOK_PAGE_ACCESS_TOKEN=${FACEBOOK_PAGE_ACCESS_TOKEN}
      - FACEBOOK_APP_ID=${FACEBOOK_APP_ID}
      - FACEBOOK_APP_SECRET=${FACEBOOK_APP_SECRET}
      - CUSTOMER_SERVICE_URL=http://customer-service:3001
      - MESSAGE_SERVICE_URL=http://message-service:3002
    depends_on:
      facebook-db:
        condition: service_healthy
      customer-service:
        condition: service_healthy
      message-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3003/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - fbpage-mm-network

  # PostgreSQL for Customer Service
  customer-db:
    image: postgres:16-alpine
    container_name: customer-service-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${CUSTOMER_SERVICE_DB:-customer_service}
    volumes:
      - customer_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fbpage-mm-network

  # PostgreSQL for Message Service
  message-db:
    image: postgres:16-alpine
    container_name: message-service-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${MESSAGE_SERVICE_DB:-message_service}
    volumes:
      - message_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fbpage-mm-network

  # PostgreSQL for Facebook Graph Service
  facebook-db:
    image: postgres:16-alpine
    container_name: facebook-graph-service-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${FACEBOOK_GRAPH_DB:-facebook_graph}
    volumes:
      - facebook_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fbpage-mm-network

  # Mattermost
  mattermost:
    image: mattermost/mattermost-team-edition:10
    container_name: mattermost
    restart: unless-stopped
    ports:
      - "${MATTERMOST_PORT:-8065}:8065"
    environment:
      - MM_SQLSETTINGS_DRIVERNAME=postgres
      - MM_SQLSETTINGS_DATASOURCE=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@mattermost-db:5432/${MATTERMOST_DB:-mattermost}?sslmode=disable&connect_timeout=10
      - MM_SERVICESETTINGS_SITEURL=${MM_SITE_URL:-http://localhost:8065}
      - MM_SERVICESETTINGS_ENABLEOUTGOINGWEBHOOKS=true
      - MM_SERVICESETTINGS_ENABLEINCOMINGWEBHOOKS=true
      - MM_SERVICESETTINGS_ENABLEBOTACCOUNTCREATION=true
      - MM_EMAILSETTINGS_ENABLESIGNUPWITHEMAIL=true
      - MM_EMAILSETTINGS_ENABLESMTPAUTH=false
      - MM_TEAMSETTINGS_ENABLEOPENSERVER=true
      - MM_PLUGINSETTINGS_ENABLEUPLOADS=true
      - MM_FILESETTINGS_MAXFILESIZE=104857600
      - MM_LOGSETTINGS_FILELEVEL=INFO
      - MM_LOGSETTINGS_CONSOLELEVEL=INFO
    volumes:
      - mattermost_data:/mattermost/data
      - mattermost_config:/mattermost/config
      - mattermost_logs:/mattermost/logs
      - mattermost_plugins:/mattermost/plugins
      - mattermost_client_plugins:/mattermost/client/plugins
      - mattermost_bleve_indexes:/mattermost/bleve-indexes
      - ./secrets/admin_password:/mattermost/config/bootstrap_admin_password:ro
    depends_on:
      mattermost-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8065/api/v4/system/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - fbpage-mm-network

  # PostgreSQL for Mattermost
  mattermost-db:
    image: postgres:16-alpine
    container_name: mattermost-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${MATTERMOST_DB:-mattermost}
    volumes:
      - mattermost_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fbpage-mm-network

volumes:
  customer_db_data:
  message_db_data:
  facebook_db_data:
  mattermost_data:
  mattermost_config:
  mattermost_logs:
  mattermost_plugins:
  mattermost_client_plugins:
  mattermost_bleve_indexes:
  mattermost_db_data:

networks:
  fbpage-mm-network:
    driver: bridge
